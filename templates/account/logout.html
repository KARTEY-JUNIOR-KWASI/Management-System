{% extends 'base.html' %}

{% block title %}Sign Out — EduMS Intelligence{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12">
  <div class="bg-white rounded-4xl shadow-xl w-full max-w-md p-8 text-center animate-scale-up border border-gray-100">
    
    <div class="w-16 h-16 bg-red-50 text-red-500 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-inner">
      <i data-lucide="log-out" class="w-8 h-8"></i>
    </div>
    
    <h2 class="font-display font-bold text-2xl text-gray-900 mb-2">Protocol Termination</h2>
    <p class="text-sm text-gray-500 mb-8 font-medium">Are you sure you wish to disconnect your session from the Intelligence Nexus?</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      {% if redirect_field_value %}
      <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
      {% endif %}

      <div class="flex gap-3">
        <a href="javascript:history.back()" class="flex-1 py-3.5 px-4 rounded-2xl border border-gray-200 text-gray-600 font-bold hover:bg-gray-50 hover:text-gray-900 transition-colors">
          Cancel
        </a>
        <button type="submit" class="flex-1 py-3.5 px-4 bg-red-500 hover:bg-red-600 text-white font-bold text-sm tracking-wider uppercase rounded-2xl shadow-lg shadow-red-500/30 transition-all flex items-center justify-center gap-2">
          Confirm Exit
        </button>
      </div>
    </form>

  </div>
</div>
{% endblock content %}
