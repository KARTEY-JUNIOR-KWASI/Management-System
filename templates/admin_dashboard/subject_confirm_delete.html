{% extends 'base.html' %}

{% block title %}Delete Subject{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">Delete Subject</h2>
    <div class="card card-akkhor" style="max-width: 600px; margin: 0 auto;">
        <div class="card-body text-center p-5">
            <i class="fas fa-exclamation-triangle text-danger" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h4>Are you sure you want to delete subject <strong>{{ subject.name }}</strong>?</h4>
            <p class="text-muted">Code: {{ subject.code }}</p>
            <p class="text-danger mb-4">This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'subject_list' %}" class="btn btn-outline-akkhor" style="text-decoration:none;">
                        <i class="fas fa-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-danger" style="border-radius: 8px; padding: 10px 24px; font-weight: 500;">
                        <i class="fas fa-trash"></i> Yes, Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
