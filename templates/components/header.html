<!-- templates/components/header.html -->
<header class="bg-indigo-600 text-white sticky top-0 z-50 rounded-b-3xl shadow-lg">
  <div class="px-5 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      {% if school_config.logo %}
        <img src="{{ school_config.logo.url }}" class="w-10 h-10 rounded-xl" alt="Logo">
      {% else %}
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-bold text-lg">
          {{ school_config.name|slice:":1" }}
        </div>
      {% endif %}
      <div>
        <h1 class="font-bold text-lg leading-tight tracking-tight">{{ title|default:school_config.name }}</h1>
        <p class="text-indigo-100 text-[10px] uppercase font-bold tracking-widest opacity-80">{{ subtitle|default:"Intelligence Hub" }}</p>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <button class="relative p-2 hover:bg-white/10 rounded-full transition-colors">
        <i data-lucide="bell" class="w-6 h-6"></i>
        <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-indigo-600 rounded-full"></span>
      </button>
      <a href="{% url 'logout' %}" class="bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-full text-xs font-bold transition-all backdrop-blur-md">
        EXIT
      </a>
    </div>
  </div>
</header>
